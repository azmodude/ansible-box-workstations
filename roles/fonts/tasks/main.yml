    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-Black.otf", dest: "SourceSerifPro-Black.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-BlackIt.otf", dest: "SourceSerifPro-BlackIt.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-Bold.otf", dest: "SourceSerifPro-Bold.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-BoldIt.otf", dest: "SourceSerifPro-BoldIt.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-ExtraLight.otf", dest: "SourceSerifPro-ExtraLight.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-ExtraLightIt.otf", dest: "SourceSerifPro-ExtraLightIt.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-It.otf", dest: "SourceSerifPro-It.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-Light.otf", dest: "SourceSerifPro-Light.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-LightIt.otf", dest: "SourceSerifPro-LightIt.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-Regular.otf", dest: "SourceSerifPro-Regular.otf"}
    - {name: "adobe-source-serif-pro", url: "https://github.com/adobe-fonts/source-serif-pro/raw/release/OTF/SourceSerifPro-Semibold.otf", dest: "SourceSerifPro-Semibold.otf"}

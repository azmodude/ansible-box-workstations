---
- name: Ensure destination in $HOME/.local/share/fonts is present
  file:
    path: "{{ ansible_env.HOME }}/.local/share/fonts/{{ item }}"
    state: directory
  loop:
    - hack-nerd-font
    - fira-code
    - adobe-source-code-pro
    - adobe-source-sans-pro
    - adobe-source-serif-pro
- name: Install Fonts
  get_url:
    url: "{{ item.url }}"
    dest: "{{ ansible_env.HOME }}/.local/share/fonts/{{ item.name }}/{{ item.dest }}"
  loop:
    - {name: "hack-nerd-font", url: "https://github.com/ryanoasis/nerd-fonts/raw/master/patched-fonts/Hack/Bold/complete/Hack%20Bold%20Nerd%20Font%20Complete.ttf", dest: "Hack Bold Nerd Font Complete.ttf"}
    - {name: "hack-nerd-font", url: "https://github.com/ryanoasis/nerd-fonts/raw/master/patched-fonts/Hack/BoldItalic/complete/Hack%20Bold%20Italic%20Nerd%20Font%20Complete.ttf", dest: "Hack Bold Italic Nerd Font Complete.ttf"}
    - {name: "hack-nerd-font", url: "https://github.com/ryanoasis/nerd-fonts/raw/master/patched-fonts/Hack/Italic/complete/Hack%20Italic%20Nerd%20Font%20Complete.ttf", dest: "Hack Italic Nerd Font Complete.ttf"}
    - {name: "hack-nerd-font", url: "https://github.com/ryanoasis/nerd-fonts/raw/master/patched-fonts/Hack/Regular/complete/Hack%20Regular%20Nerd%20Font%20Complete.ttf", dest: "Hack Regular Nerd Font Complete.ttf"}
    - {name: "fira-code", url: "https://github.com/tonsky/FiraCode/raw/master/distr/otf/FiraCode-Bold.otf", dest: "FiraCode-Bold.otf"}
    - {name: "fira-code", url: "https://github.com/tonsky/FiraCode/raw/master/distr/otf/FiraCode-Light.otf", dest: "FiraCode-Light.otf"}
    - {name: "fira-code", url: "https://github.com/tonsky/FiraCode/raw/master/distr/otf/FiraCode-Medium.otf", dest: "FiraCode-Medium.otf"}
    - {name: "fira-code", url: "https://github.com/tonsky/FiraCode/raw/master/distr/otf/FiraCode-Regular.otf", dest: "FiraCode-Regular.otf"}
    - {name: "fira-code", url: "https://github.com/tonsky/FiraCode/raw/master/distr/otf/FiraCode-Retina.otf", dest: "FiraCode-Retina.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-Black.otf", dest: "SourceCodePro-Black.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-BlackIt.otf", dest: "SourceCodePro-BlackIt.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-Bold.otf", dest: "SourceCodePro-Bold.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-BoldIt.otf", dest: "SourceCodePro-BoldIt.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-ExtraLight.otf", dest: "SourceCodePro-ExtraLight.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-ExtraLightIt.otf", dest: "SourceCodePro-ExtraLightIt.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-It.otf", dest: "SourceCodePro-It.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-Light.otf", dest: "SourceCodePro-Light.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-LightIt.otf", dest: "SourceCodePro-LightIt.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-Medium.otf", dest: "SourceCodePro-Medium.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-MediumIt.otf", dest: "SourceCodePro-MediumIt.otf"}
    - {name: "adobe-source-code-pro", url: "https://github.com/adobe-fonts/source-code-pro/raw/release/OTF/SourceCodePro-Regular.otf", dest: "SourceCodePro-Regular.otf"}

    - {name: "adobe-source-sans-pro", url: "https://github.com/adobe-fonts/source-sans-pro/raw/release/OTF/SourceSansPro-BoldIt.otf", dest: "SourceSansPro-BoldIt.otf"}
    - {name: "adobe-source-sans-pro", url: "https://github.com/adobe-fonts/source-sans-pro/raw/release/OTF/SourceSansPro-ExtraLight.otf", dest: "SourceSansPro-ExtraLight.otf"}
    - {name: "adobe-source-sans-pro", url: "https://github.com/adobe-fonts/source-sans-pro/raw/release/OTF/SourceSansPro-ExtraLightIt.otf", dest: "SourceSansPro-ExtraLightIt.otf"}
    - {name: "adobe-source-sans-pro", url: "https://github.com/adobe-fonts/source-sans-pro/raw/release/OTF/SourceSansPro-It.otf", dest: "SourceSansPro-It.otf"}
    - {name: "adobe-source-sans-pro", url: "https://github.com/adobe-fonts/source-sans-pro/raw/release/OTF/SourceSansPro-Light.otf", dest: "SourceSansPro-Light.otf"}
    - {name: "adobe-source-sans-pro", url: "https://github.com/adobe-fonts/source-sans-pro/raw/release/OTF/SourceSansPro-LightIt.otf", dest: "SourceSansPro-LightIt.otf"}

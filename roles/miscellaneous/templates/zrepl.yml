---
jobs:
  # this job takes care of snapshot creation + pruning
  - name: snapjob
    type: snap
    filesystems: {"dpool/home<": true}
    # create snapshots with prefix `zrepl_` every 15 minutes
    snapshotting:
      type: periodic
      interval: 15m
      prefix: zrepl_
    pruning:
      keep:
        # fade-out scheme for snapshots starting with `zrepl_`
        # - keep all created in the last hour
        # - then destroy snapshots such that we keep 24 each 1 hour apart
        # - then destroy snapshots such that we keep 14 each 1 day apart
        # - then destroy snapshots such that we keep 3 each 30 days apart
        # - then destroy all older snapshots
        - type: grid
          grid: 1x1h(keep=all) | 24x1h | 30x1d | 3x30d
          regex: "^zrepl_.*"
        # keep all snapshots that don't have the `zrepl_` prefix
        - type: regex
          negate: true
          regex: "^zrepl_.*"

  # This job pushes to the local sink defined in job `backuppool_sink`.
  # We trigger replication manually from the command line / udev rules using
  #  `zrepl signal wakeup push_to_drive`
  - type: push
    name: push_to_drive
    connect:
      type: local
      listener_name: backuppool_sink
      client_identity: hephaestus
    filesystems: {"dpool/home<": true}
    send:
      encrypted: true
    replication:
      protection:
        initial: guarantee_resumability
        # Downgrade protection to guarantee_incremental which uses zfs
        # bookmarks instead of zfs holds.
        # Thus, when we yank out the backup drive during replication - we might
        # not be able to resume the interrupted replication step because the
        # partially received `to` snapshot of a `from`->`to` step may be pruned
        # any time - but in exchange we get back the disk space allocated by
        # `to` when we prune it - and because we still have the bookmarks
        # created by `guarantee_incremental`, we can still do incremental
        # replication of `from`->`to2` in the future
        incremental: guarantee_incremental
    snapshotting:
      type: manual
    pruning:
      # no-op prune rule on sender (keep all snapshots), job `snapshot` takes
      # care of this
      keep_sender:
        - type: regex
          regex: ".*"
      # retain
      keep_receiver:
        # longer retention on the backup drive, we have more space there
        - type: grid
          grid: 1x1h(keep=all) | 24x1h | 360x1d
          regex: "^zrepl_.*"
        # retain all non-zrepl snapshots on the backup drive
        - type: regex
          negate: true
          regex: "^zrepl_.*"

  # This job receives from job `push_to_drive` into
  # `backuppool/zrepl/myhostname`
  - type: sink
    name: backuppool_sink
    root_fs: "backup-ssd-pool/zrepl"
    serve:
      type: local
      listener_name: backuppool_sink

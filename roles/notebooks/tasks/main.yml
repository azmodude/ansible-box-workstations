---
- name: Enable notebook specific services
  block:
    - name: Enable and start services
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      become: true
      with_items:
        - tlp

    - name: Enable services
      systemd:
        name: "{{ item }}"
        enabled: true
      become: true
      with_items:
        - []
  become: true

- name: Enable acpid when Gnome/KDE is not installed (e.g. i3)
  block:
    - name: Copy acpid handlers and events files to destination
      copy:
        src: "acpi/{{ item }}"
        dest: "/etc/acpi"
        directory_mode: 0755
      with_items:
        - events
        - handlers
      notify:
        - Restart acpid
    - name: Ensure scripts in handlers do have execute permissions
      file:
        dest: "{{ item }}"
        mode: 0755
      with_fileglob:
        - /etc/acpi/handlers/*
  become: true
  when: gnome_installed != true
